<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЧМ 2026 Прогнозы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap');

:root {
  --bg:#0a0e1a; --card:#111827; --card2:#1a2235; --border:#1e2d45;
  --accent:#e8c14a; --accent2:#f97316; --green:#22c55e; --red:#ef4444;
  --blue:#3b82f6; --text:#f0f4ff; --muted:#6b7a99; --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.header{background:linear-gradient(135deg,#0d1b2e,#1a2f4e);padding:16px 16px 12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-family:'Bebas Neue',Arial,sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);}
.logo span{color:var(--text);}
.user-badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px;}
.user-badge .score{color:var(--accent);}

.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-family:'Nunito',Arial,sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0a0e1a;}
.tab.admin-tab{border-color:#7c3aed44;color:#a855f7;}
.tab.admin-tab.active{background:#7c3aed;border-color:#7c3aed;color:white;}

.page{display:none;padding:14px;padding-bottom:50px;}
.page.active{display:block;}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.match-card.has-pred{border-color:#2a3d5e;}
.match-card.locked{opacity:0.75;}
.match-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px;}
.match-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.match-dl{font-size:11px;color:var(--muted);}
.match-dl.soon{color:var(--accent2);}
.match-dl.past{color:var(--red);}

.score-row{display:flex;align-items:flex-end;justify-content:center;padding:8px 14px 12px;gap:10px;}
.team-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;max-width:110px;}
.team-flag{font-size:30px;line-height:1;}
.team-name{font-family:'Bebas Neue',Arial,sans-serif;font-size:14px;color:var(--text);text-align:center;line-height:1.2;}
.score-box{width:54px;height:54px;background:var(--card2);border:2px solid var(--border);border-radius:12px;font-family:'Bebas Neue',Arial,sans-serif;font-size:28px;color:var(--text);text-align:center;outline:none;transition:border-color 0.2s;-moz-appearance:textfield;}
.score-box::-webkit-outer-spin-button,.score-box::-webkit-inner-spin-button{-webkit-appearance:none;}
.score-box:focus{border-color:var(--accent);}
.score-box:disabled{opacity:0.5;}
.score-sep{font-family:'Bebas Neue',Arial,sans-serif;font-size:30px;color:var(--muted);flex-shrink:0;padding-bottom:2px;}

.special-title{font-size:14px;font-weight:700;padding:4px 14px 8px;color:var(--text);}
.special-input{width:calc(100% - 28px);margin:0 14px 12px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:700;color:var(--text);outline:none;}
.special-input:focus{border-color:var(--accent);}
.special-input:disabled{opacity:0.5;}

.result-badge{display:flex;align-items:center;gap:6px;margin:0 14px 8px;padding:6px 12px;background:#1a2a1a;border:1px solid #2d4a2d;border-radius:8px;font-size:13px;font-weight:700;color:var(--green);}

.card-bottom{border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;}
.x2-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;font-size:12px;font-weight:900;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
.x2-btn.active{background:linear-gradient(135deg,#f97316,#dc2626);border-color:#f97316;color:white;}
.x2-btn:disabled{opacity:0.4;cursor:not-allowed;}
.save-btn{background:var(--accent);border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:900;color:#0a0e1a;cursor:pointer;flex-shrink:0;margin-left:auto;}
.save-btn:active{transform:scale(0.95);}

.pred-info{border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.pred-val{color:var(--muted);font-weight:600;}
.pred-val span{color:var(--text);font-weight:700;}
.x2-tag{background:linear-gradient(135deg,#f97316,#dc2626);color:white;font-size:10px;font-weight:900;padding:2px 6px;border-radius:4px;margin-left:4px;}
.pts{font-weight:900;font-size:14px;}
.pts.pos{color:var(--green);}.pts.neg{color:var(--red);}.pts.wait{color:var(--muted);}

.section-title{font-family:'Bebas Neue',Arial,sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.lb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.lb-row{display:flex;align-items:center;padding:12px 16px;gap:12px;border-bottom:1px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
.lb-row.me{background:#0f1e35;}
.lb-rank{font-family:'Bebas Neue',Arial,sans-serif;font-size:20px;width:26px;text-align:center;color:var(--muted);flex-shrink:0;}
.lb-rank.gold{color:#fbbf24;}.lb-rank.silver{color:#94a3b8;}.lb-rank.bronze{color:#cd7c3a;}
.lb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;}
.lb-name{flex:1;font-weight:700;font-size:14px;}
.lb-pts{font-family:'Bebas Neue',Arial,sans-serif;font-size:22px;color:var(--accent);}
.lb-pts-lbl{font-size:10px;color:var(--muted);font-weight:700;text-align:right;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-card.wide{grid-column:1/-1;}
.stat-val{font-family:'Bebas Neue',Arial,sans-serif;font-size:30px;color:var(--accent);}
.stat-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.prog{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;}
.ps-row{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border);}
.ps-row:last-child{border-bottom:none;}
.ps-name{flex:1;font-weight:700;font-size:13px;}
.ps-bar{flex:2;}
.ps-pts{font-weight:900;font-size:13px;color:var(--accent);min-width:32px;text-align:right;}

.admin-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.admin-title{font-weight:700;font-size:14px;margin-bottom:10px;}
.admin-row{display:flex;gap:8px;align-items:center;}
.admin-input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-family:'Nunito',Arial,sans-serif;font-size:13px;font-weight:700;color:var(--text);outline:none;}
.admin-input:focus{border-color:#a855f7;}
.admin-btn{background:#7c3aed;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:900;color:white;cursor:pointer;flex-shrink:0;}
.res-set{color:var(--green);font-size:12px;font-weight:700;margin-top:6px;}

.import-box{background:linear-gradient(135deg,#1a1040,#0f1e35);border:1px solid #4c1d95;border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.import-title{font-family:'Bebas Neue',Arial,sans-serif;font-size:17px;letter-spacing:1px;color:#a855f7;margin-bottom:6px;}
.import-sub{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.api-input{width:100%;background:var(--card2);border:1.5px solid #4c1d95;border-radius:9px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;margin-bottom:8px;font-family:'Nunito',Arial,sans-serif;}
.import-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:900;color:white;cursor:pointer;}

.add-box{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.add-title{font-weight:700;font-size:13px;color:var(--muted);margin-bottom:10px;}
.add-row{display:flex;gap:8px;margin-bottom:8px;}
.add-input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;font-family:'Nunito',Arial,sans-serif;}
select.add-input{cursor:pointer;}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e2d45;border:1px solid var(--border);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:700;z-index:999;transition:transform 0.3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--accent);color:var(--accent);}

.loader{text-align:center;padding:36px 20px;color:var(--muted);font-weight:600;}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:36px 20px;color:var(--muted);}
.empty-ic{font-size:36px;margin-bottom:10px;}

.reg{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;padding:24px;text-align:center;gap:14px;}
.reg-ic{font-size:56px;}
.reg-title{font-family:'Bebas Neue',Arial,sans-serif;font-size:30px;letter-spacing:2px;color:var(--accent);}
.reg-sub{color:var(--muted);font-size:14px;line-height:1.5;}
.reg-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;font-weight:700;color:var(--text);outline:none;text-align:center;font-family:'Nunito',Arial,sans-serif;}
.reg-input:focus{border-color:var(--accent);}
.reg-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:900;color:#0a0e1a;cursor:pointer;}

.refresh-row{display:flex;justify-content:flex-end;margin-bottom:10px;}
.refresh-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
</style>
</head>
<body>

<div id="reg" class="reg" style="display:none">
  <div class="reg-ic">⚽</div>
  <div class="reg-title">ЧМ 2026<br>Прогнозы</div>
  <div class="reg-sub">Введи своё имя чтобы участвовать</div>
  <input class="reg-input" id="name-inp" type="text" placeholder="Твоё имя" maxlength="20">
  <button class="reg-btn" onclick="registerUser()">Присоединиться 🚀</button>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="logo">ЧМ <span>2026</span></div>
      <div class="user-badge"><span id="uname">—</span><span class="score" id="uscore">0 pts</span></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pred',this)">⚽ Прогнозы</button>
      <button class="tab" onclick="switchTab('lb',this)">🏆 Лидерборд</button>
      <button class="tab" onclick="switchTab('stats',this)">📊 Статистика</button>
      <button class="tab admin-tab" id="admin-tab" style="display:none" onclick="switchTab('admin',this)">⚙️ Админ</button>
    </div>
  </div>

  <div class="page active" id="page-pred">
    <div class="loader" id="pred-loader"><div class="spin"></div>Загружаем матчи...</div>
    <div id="matches"></div>
  </div>

  <div class="page" id="page-lb">
    <div class="refresh-row"><button class="refresh-btn" onclick="loadLB()">↻ Обновить</button></div>
    <div class="section-title">Таблица</div>
    <div class="loader" id="lb-loader"><div class="spin"></div></div>
    <div class="lb-card" id="lb-list" style="display:none"></div>
  </div>

  <div class="page" id="page-stats">
    <div class="loader" id="stats-loader"><div class="spin"></div>Считаем...</div>
    <div id="stats-content" style="display:none"></div>
  </div>

  <div class="page" id="page-admin">
    <div class="import-box">
      <div class="import-title">🌐 Импорт матчей ЧМ 2026</div>
      <div class="import-sub">API-ключ с football-data.org — запрос идёт через Google Apps Script</div>
      <input class="api-input" id="api-key" type="text" placeholder="Вставь API-ключ...">
      <button class="import-btn" onclick="importMatches()">⚡ Импортировать матчи</button>
    </div>

    <div class="add-box">
      <div class="add-title">➕ Добавить своё событие</div>
      <div class="add-row">
        <input class="add-input" id="ev-title" type="text" placeholder="Название">
        <select class="add-input" id="ev-type" style="max-width:110px" onchange="toggleTeams()">
          <option value="special">🌟 Событие</option>
          <option value="match">⚽ Матч</option>
        </select>
      </div>
      <div class="add-row" id="ev-teams" style="display:none">
        <input class="add-input" id="ev-t1" type="text" placeholder="Команда 1">
        <input class="add-input" id="ev-t2" type="text" placeholder="Команда 2">
      </div>
      <div class="add-row">
        <input class="add-input" id="ev-dl" type="datetime-local">
        <button class="admin-btn" onclick="addEvent()">Добавить</button>
      </div>
    </div>

    <div class="section-title">Результаты</div>
    <div id="admin-list"><div class="loader"><div class="spin"></div></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyLJ-efaVw_W-MgDVJJgaPhPqnxiNYTfl5VUP7au3bv19rcn2CQ3mfgMnMl18tvxSftXQ/exec';
const ADMIN_KEY = 'WC2026ADMIN';
const ADMIN_IDS = ['349513510'];

const FLAGS = {
  'Аргентина':'🇦🇷','Argentina':'🇦🇷','Франция':'🇫🇷','France':'🇫🇷',
  'Бразилия':'🇧🇷','Brazil':'🇧🇷','Германия':'🇩🇪','Germany':'🇩🇪',
  'Испания':'🇪🇸','Spain':'🇪🇸','Португалия':'🇵🇹','Portugal':'🇵🇹',
  'Англия':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Нидерланды':'🇳🇱','Netherlands':'🇳🇱',
  'Бельгия':'🇧🇪','Belgium':'🇧🇪','Хорватия':'🇭🇷','Croatia':'🇭🇷',
  'Марокко':'🇲🇦','Morocco':'🇲🇦','Япония':'🇯🇵','Japan':'🇯🇵',
  'Мексика':'🇲🇽','Mexico':'🇲🇽','США':'🇺🇸','United States':'🇺🇸',
  'Канада':'🇨🇦','Canada':'🇨🇦','Австралия':'🇦🇺','Australia':'🇦🇺',
  'Сенегал':'🇸🇳','Senegal':'🇸🇳','Уругвай':'🇺🇾','Uruguay':'🇺🇾',
  'Колумбия':'🇨🇴','Colombia':'🇨🇴','Швейцария':'🇨🇭','Switzerland':'🇨🇭',
  'Турция':'🇹🇷','Turkey':'🇹🇷','Италия':'🇮🇹','Italy':'🇮🇹',
  'Сербия':'🇷🇸','Serbia':'🇷🇸','Польша':'🇵🇱','Poland':'🇵🇱',
  'Южная Корея':'🇰🇷','South Korea':'🇰🇷','Иран':'🇮🇷','Iran':'🇮🇷',
  'Марокко':'🇲🇦','Morocco':'🇲🇦','Тунис':'🇹🇳','Tunisia':'🇹🇳',
  'Эквадор':'🇪🇨','Ecuador':'🇪🇨','Венесуэла':'🇻🇪','Venezuela':'🇻🇪',
  'Перу':'🇵🇪','Peru':'🇵🇪','Чили':'🇨🇱','Chile':'🇨🇱',
  'Парагвай':'🇵🇾','Paraguay':'🇵🇾','Боливия':'🇧🇴','Bolivia':'🇧🇴',
};
const F = n => FLAGS[n] || '🏳️';

let tg = window.Telegram?.WebApp;
let uid, uname, matches = [], preds = {}, lb = [];
let x2week = false;

window.addEventListener('load', async () => {
  if (tg) {
    tg.ready(); tg.expand();
    tg.setHeaderColor('#0a0e1a');
    tg.setBackgroundColor('#0a0e1a');
    const u = tg.initDataUnsafe?.user;
    if (u) { uid = u.id.toString(); uname = u.first_name + (u.last_name ? ' ' + u.last_name : ''); }
  }
  if (!uid) uid = 'test_' + Math.floor(Math.random() * 9000 + 1000);
  if (ADMIN_IDS.includes(uid)) document.getElementById('admin-tab').style.display = 'block';
  await checkReg();
});

async function checkReg() {
  const s = localStorage.getItem('wc26_' + uid);
  if (s) { uname = JSON.parse(s).name; showApp(); }
  else if (uname) { await doReg(uname); showApp(); }
  else document.getElementById('reg').style.display = 'flex';
}
async function registerUser() {
  const n = document.getElementById('name-inp').value.trim();
  if (!n) { toast('Введи имя!', 'err'); return; }
  await doReg(n);
  document.getElementById('reg').style.display = 'none';
  showApp();
}
async function doReg(name) {
  uname = name;
  localStorage.setItem('wc26_' + uid, JSON.stringify({ name }));
  await api({ action: 'registerUser', user_id: uid, name });
}
function showApp() {
  document.getElementById('uname').textContent = uname;
  document.getElementById('app').style.display = 'block';
  loadAll();
}

async function api(p) {
  const url = new URL(API);
  Object.entries(p).forEach(([k, v]) => url.searchParams.set(k, v));
  try { const r = await fetch(url.toString()); return await r.json(); }
  catch (e) { return { error: e.message }; }
}

async function loadAll() {
  const [md, pd, lbd] = await Promise.all([
    api({ action: 'getMatches' }),
    api({ action: 'getUserPredictions', user_id: uid }),
    api({ action: 'getLeaderboard' })
  ]);
  matches = md.matches || [];
  preds = {};
  (pd.predictions || []).forEach(p => preds[p.match_id] = p);
  lb = lbd.leaderboard || [];
  checkX2();
  renderMatches();
  renderLB(lb);
  updateScore(lb);
  renderAdminList();
}

function checkX2() {
  const now = new Date(), ws = new Date(now);
  ws.setDate(now.getDate() - now.getDay()); ws.setHours(0,0,0,0);
  x2week = false;
  matches.forEach(m => { if (new Date(m.deadline) >= ws && preds[m.id]?.is_x2) x2week = true; });
}
function updateScore(l) {
  const me = l.find(r => r.user_id === uid);
  const pts = me ? Math.round(me.points * 10) / 10 : 0;
  document.getElementById('uscore').textContent = (pts > 0 ? '+' : '') + pts + ' pts';
}

// ── МАТЧИ ──
function renderMatches() {
  document.getElementById('pred-loader').style.display = 'none';
  const el = document.getElementById('matches');
  if (!matches.length) { el.innerHTML = '<div class="empty"><div class="empty-ic">📅</div><div>Матчи ещё не добавлены</div></div>'; return; }
  el.innerHTML = matches.map(buildCard).join('');
}

function buildCard(m) {
  const now = new Date(), dl = new Date(m.deadline);
  const locked = now > dl;
  const p = preds[m.id];
  const hasRes = !!m.result;
  const diff = dl - now, diffH = diff / 3600000;
  let dlTxt, dlCls = '';
  if (locked) { dlTxt = '🔒 Закрыт'; dlCls = 'past'; }
  else if (diffH < 3) { dlTxt = '⏳ ' + Math.ceil(diff / 60000) + ' мин'; dlCls = 'soon'; }
  else if (diffH < 24) { dlTxt = '⏰ ' + Math.floor(diffH) + ' ч'; dlCls = 'soon'; }
  else dlTxt = '📅 ' + dl.toLocaleDateString('ru', { day: 'numeric', month: 'short' });

  const isX2 = p?.is_x2;
  const canX2 = !locked && (!x2week || isX2);

  let body = '';
  if (m.type === 'match') {
    const parts = p ? p.prediction.split(':') : ['', ''];
    body = `<div class="score-row">
      <div class="team-block"><div class="team-flag">${F(m.team1)}</div><div class="team-name">${m.team1}</div>
        <input class="score-box" id="s1-${m.id}" type="number" min="0" max="99" value="${parts[0]||''}" placeholder="0" ${locked?'disabled':''}></div>
      <div class="score-sep">:</div>
      <div class="team-block"><div class="team-flag">${F(m.team2)}</div><div class="team-name">${m.team2}</div>
        <input class="score-box" id="s2-${m.id}" type="number" min="0" max="99" value="${parts[1]||''}" placeholder="0" ${locked?'disabled':''}></div>
    </div>`;
  } else {
    body = `<div class="special-title">🌟 ${m.title}</div>
      <input class="special-input" id="sp-${m.id}" type="text" placeholder="Твой ответ..." value="${p?.prediction||''}" ${locked?'disabled':''}>`;
  }

  const resHtml = hasRes ? `<div class="result-badge">✅ Результат: <strong>${m.result}</strong></div>` : '';

  let predInfo = '';
  if (p) {
    const pts = Number(p.points);
    if (hasRes && p.points !== '') {
      const cls = pts > 0 ? 'pos' : pts < 0 ? 'neg' : '';
      predInfo = `<div class="pred-info"><div class="pred-val">Прогноз: <span>${p.prediction}</span>${p.is_x2?'<span class="x2-tag">x2</span>':''}</div><div class="pts ${cls}">${pts>0?'+':''}${pts} pts</div></div>`;
    } else if (!hasRes) {
      predInfo = `<div class="pred-info"><div class="pred-val">Прогноз: <span>${p.prediction}</span>${p.is_x2?'<span class="x2-tag">x2</span>':''}</div><div class="pts wait">ждём ⏳</div></div>`;
    }
  }

  const bottom = !locked ? `<div class="card-bottom">
    <button class="x2-btn ${isX2?'active':''}" id="x2-${m.id}" onclick="toggleX2('${m.id}')" ${!canX2&&!isX2?'disabled':''}>⚡ x2</button>
    <button class="save-btn" onclick="save('${m.id}','${m.type}')">✓ Сохранить</button>
  </div>` : '';

  return `<div class="match-card ${p?'has-pred':''} ${locked?'locked':''}" id="card-${m.id}">
    <div class="match-header"><div class="match-type">${m.type==='match'?'⚽ Матч':'🌟 Событие'}</div><div class="match-dl ${dlCls}">${dlTxt}</div></div>
    ${body}${resHtml}${predInfo}${bottom}
  </div>`;
}

function toggleX2(mid) {
  const btn = document.getElementById('x2-' + mid);
  const active = btn.classList.contains('active');
  btn.classList.toggle('active', !active);
  matches.forEach(m => { if (m.id !== mid) { const o = document.getElementById('x2-'+m.id); if (o && !o.classList.contains('active')) o.disabled = !active; } });
}

async function save(mid, type) {
  let prediction;
  if (type === 'match') {
    const s1 = document.getElementById('s1-'+mid)?.value;
    const s2 = document.getElementById('s2-'+mid)?.value;
    if (s1 === '' || s2 === '') { toast('Введи счёт!', 'err'); return; }
    prediction = s1 + ':' + s2;
  } else {
    prediction = document.getElementById('sp-'+mid)?.value.trim();
    if (!prediction) { toast('Введи ответ!', 'err'); return; }
  }
  const isX2 = document.getElementById('x2-'+mid)?.classList.contains('active') || false;
  const btn = document.querySelector(`#card-${mid} .save-btn`);
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  const res = await api({ action: 'savePrediction', user_id: uid, match_id: mid, prediction, is_x2: isX2.toString() });
  if (btn) { btn.textContent = '✓ Сохранить'; btn.disabled = false; }
  if (res.error) toast(res.error, 'err');
  else {
    toast(isX2 ? '⚡ Прогноз x2 сохранён!' : '✅ Прогноз сохранён!', 'ok');
    preds[mid] = { prediction, is_x2: isX2, points: '' };
    if (isX2) x2week = true;
    const card = document.getElementById('card-'+mid);
    const match = matches.find(m => m.id === mid);
    if (match && card) card.outerHTML = buildCard(match);
  }
}

// ── ЛИДЕРБОРД ──
async function loadLB() {
  document.getElementById('lb-loader').style.display = 'block';
  document.getElementById('lb-list').style.display = 'none';
  const d = await api({ action: 'getLeaderboard' });
  lb = d.leaderboard || [];
  renderLB(lb); updateScore(lb);
}
function renderLB(l) {
  document.getElementById('lb-loader').style.display = 'none';
  const el = document.getElementById('lb-list');
  if (!l.length) { el.innerHTML = '<div class="empty"><div class="empty-ic">🏆</div><div>Пока пусто</div></div>'; el.style.display='block'; return; }
  const ranks=['gold','silver','bronze'], medals=['🥇','🥈','🥉'];
  el.innerHTML = l.map((p,i) => {
    const isMe = p.user_id === uid;
    const ini = p.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const pts = Math.round(p.points*10)/10;
    return `<div class="lb-row ${isMe?'me':''}">
      <div class="lb-rank ${i<3?ranks[i]:''}">${i<3?medals[i]:i+1}</div>
      <div class="lb-avatar">${ini}</div>
      <div class="lb-name">${p.name}${isMe?' 👈':''}</div>
      <div><div class="lb-pts">${pts>0?'+':''}${pts}</div><div class="lb-pts-lbl">очков</div></div>
    </div>`;
  }).join('');
  el.style.display = 'block';
}

// ── СТАТИСТИКА ──
async function loadStats() {
  document.getElementById('stats-loader').style.display = 'block';
  document.getElementById('stats-content').style.display = 'none';
  const lbd = await api({ action: 'getLeaderboard' });
  const l = lbd.leaderboard || [];
  const fin = matches.filter(m => m.result);
  const myP = Object.values(preds);
  const myFin = myP.filter(p => matches.find(m => m.id===p.match_id&&m.result));
  const myOk = myFin.filter(p => Number(p.points) > 0).length;
  const myPct = myFin.length ? Math.round(myOk/myFin.length*100) : 0;
  const myTotal = myP.reduce((s,p) => s+(Number(p.points)||0), 0);
  const myX2 = myP.filter(p => p.is_x2).length;
  const me = l.find(r => r.user_id===uid);
  const myRank = me ? l.indexOf(me)+1 : '-';

  document.getElementById('stats-loader').style.display = 'none';
  document.getElementById('stats-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${myRank}</div><div class="stat-lbl">Моё место</div></div>
      <div class="stat-card"><div class="stat-val">${myTotal>0?'+':''}${Math.round(myTotal*10)/10}</div><div class="stat-lbl">Мои очки</div></div>
      <div class="stat-card"><div class="stat-val">${myPct}%</div><div class="stat-lbl">% угаданных</div><div class="prog"><div class="prog-fill" style="width:${myPct}%"></div></div></div>
      <div class="stat-card"><div class="stat-val">${myX2}</div><div class="stat-lbl">x2 ставок</div></div>
      <div class="stat-card wide"><div class="stat-val">${fin.length} / ${matches.length}</div><div class="stat-lbl">Матчей сыграно</div><div class="prog"><div class="prog-fill" style="width:${matches.length?fin.length/matches.length*100:0}%"></div></div></div>
    </div>
    <div class="section-title">По игрокам</div>
    <div class="lb-card">
      ${l.length ? l.map((p,i) => {
        const max = l[0]?.points||1, pct = Math.max(0,Math.round(p.points/max*100));
        return `<div class="ps-row">
          <div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
          <div class="ps-name">${p.name}</div>
          <div class="ps-bar"><div class="prog" style="margin:0"><div class="prog-fill" style="width:${pct}%"></div></div></div>
          <div class="ps-pts">${Math.round(p.points*10)/10}</div>
        </div>`;
      }).join('') : '<div class="empty" style="padding:16px">Пока нет данных</div>'}
    </div>`;
  document.getElementById('stats-content').style.display = 'block';
}

// ── АДМИН ──
function renderAdminList() {
  const el = document.getElementById('admin-list');
  if (!matches.length) { el.innerHTML = '<div class="empty"><div>Матчей пока нет</div></div>'; return; }
  el.innerHTML = matches.map(m => `
    <div class="admin-card">
      <div class="admin-title">${m.type==='match'?'⚽':'🌟'} ${m.title||m.team1+' vs '+m.team2}</div>
      ${m.result?`<div class="res-set">✅ ${m.result}</div>`:''}
      <div class="admin-row" style="margin-top:8px">
        <input class="admin-input" id="res-${m.id}" type="text" placeholder="${m.type==='match'?'напр. 2:1':'результат'}" value="${m.result||''}">
        <button class="admin-btn" onclick="setResult('${m.id}')">✓</button>
      </div>
    </div>`).join('');
}

async function setResult(mid) {
  const result = document.getElementById('res-'+mid)?.value.trim();
  if (!result) { toast('Введи результат!', 'err'); return; }
  const res = await api({ action: 'setResult', match_id: mid, result, admin_key: ADMIN_KEY });
  if (res.error) toast(res.error, 'err');
  else { toast('✅ Результат сохранён!', 'ok'); await loadAll(); }
}

async function importMatches() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) { toast('Введи API-ключ!', 'err'); return; }
  toast('⏳ Импортируем...', 'info');
  const res = await api({ action: 'importWC2026Matches', api_key: key, admin_key: ADMIN_KEY });
  if (res.error) toast('Ошибка: ' + res.error, 'err');
  else { toast('✅ Импортировано ' + res.imported + ' матчей!', 'ok'); await loadAll(); }
}

function toggleTeams() {
  document.getElementById('ev-teams').style.display = document.getElementById('ev-type').value==='match' ? 'flex' : 'none';
}
async function addEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const type = document.getElementById('ev-type').value;
  const t1 = document.getElementById('ev-t1').value.trim();
  const t2 = document.getElementById('ev-t2').value.trim();
  const dl = document.getElementById('ev-dl').value;
  if (!title || !dl) { toast('Заполни название и дедлайн!', 'err'); return; }
  const res = await api({ action: 'addMatch', title: type==='match'?t1+' vs '+t2:title, team1:t1, team2:t2, deadline:new Date(dl).toISOString(), type });
  if (res.error) toast(res.error, 'err');
  else { toast('✅ Добавлено!', 'ok'); ['ev-title','ev-t1','ev-t2','ev-dl'].forEach(id=>document.getElementById(id).value=''); await loadAll(); }
}

// ── ТАБЫ ──
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if (tab==='lb') loadLB();
  if (tab==='stats') loadStats();
}

let tt;
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
